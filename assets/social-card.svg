<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="ATLAS — Agentic Harness Standard">
  <title>ATLAS — Agentic Harness Standard</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a1126"/>
      <stop offset="100%" stop-color="#070b1a"/>
    </linearGradient>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="gMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gInner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="focal" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotGold" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </radialGradient>
    <radialGradient id="dotCyan" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid texture (very faint) -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.25">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320"  y1="0" x2="320"  y2="640"/>
    <line x1="640"  y1="0" x2="640"  y2="640"/>
    <line x1="960"  y1="0" x2="960"  y2="640"/>
  </g>

  <!-- Star field -->
  <g fill="#67e8f9">
    <circle cx="120"  cy="80"  r="1.5" opacity="0.55"/>
    <circle cx="1100" cy="120" r="2"   opacity="0.6"/>
    <circle cx="200"  cy="500" r="1.5" opacity="0.5"/>
    <circle cx="1000" cy="540" r="1.8" opacity="0.55"/>
    <circle cx="60"   cy="320" r="1.2" opacity="0.45"/>
    <circle cx="1220" cy="320" r="1.2" opacity="0.45"/>
    <circle cx="420"  cy="60"  r="1"   opacity="0.5"/>
    <circle cx="900"  cy="80"  r="1"   opacity="0.45"/>
    <circle cx="160"  cy="200" r="1"   opacity="0.4"/>
    <circle cx="1140" cy="220" r="1.2" opacity="0.5"/>
    <circle cx="320"  cy="580" r="1.4" opacity="0.55"/>
    <circle cx="780"  cy="600" r="1.2" opacity="0.45"/>
  </g>

  <!-- LEFT: mark (centered around 240, 320) -->
  <g transform="translate(60, 64)">
    <!-- Focal glow -->
    <circle cx="180" cy="256" r="160" fill="url(#focal)"/>

    <!-- Nested triangles (parallax kaleidoscope) -->
    <path d="M 180 56 L 320 320 L 40 320 Z"
          fill="none" stroke="url(#gt)" stroke-width="22" stroke-linejoin="round"/>
    <path d="M 180 88 L 290 304 L 70 304 Z"
          fill="none" stroke="url(#gMid)" stroke-width="14" stroke-linejoin="round"
          opacity="0.78" transform="rotate(6 180 256)"/>
    <path d="M 180 122 L 260 278 L 100 278 Z"
          fill="none" stroke="url(#gInner)" stroke-width="9" stroke-linejoin="round"
          opacity="0.6" transform="rotate(-10 180 256)"/>
    <path d="M 180 156 L 230 252 L 130 252 Z"
          fill="none" stroke="url(#gInner)" stroke-width="6" stroke-linejoin="round"
          opacity="0.45" transform="rotate(18 180 256)"/>
    <path d="M 180 184 L 205 236 L 155 236 Z"
          fill="none" stroke="#67e8f9" stroke-width="4" stroke-linejoin="round"
          opacity="0.55" transform="rotate(-26 180 256)"/>

    <!-- Core -->
    <circle cx="180" cy="256" r="5" fill="#e0e7ff" opacity="0.9"/>
    <circle cx="180" cy="256" r="10" fill="#67e8f9" opacity="0.18"/>

    <!-- Corner anchors -->
    <circle cx="180" cy="56" r="38" fill="#facc15" opacity="0.13"/>
    <circle cx="180" cy="56" r="28" fill="#facc15" opacity="0.22"/>
    <circle cx="180" cy="56" r="22" fill="url(#dotGold)"/>
    <circle cx="180" cy="56" r="6"  fill="#fffbeb" opacity="0.9"/>

    <circle cx="40" cy="320" r="36" fill="#22d3ee" opacity="0.12"/>
    <circle cx="40" cy="320" r="26" fill="#22d3ee" opacity="0.2"/>
    <circle cx="40" cy="320" r="20" fill="url(#dotCyan)"/>
    <circle cx="40" cy="320" r="5"  fill="#e0f7ff" opacity="0.85"/>

    <circle cx="320" cy="320" r="36" fill="#22d3ee" opacity="0.12"/>
    <circle cx="320" cy="320" r="26" fill="#22d3ee" opacity="0.2"/>
    <circle cx="320" cy="320" r="20" fill="url(#dotCyan)"/>
    <circle cx="320" cy="320" r="5"  fill="#e0f7ff" opacity="0.85"/>
  </g>

  <!-- RIGHT: wordmark + tagline + key stats -->
  <g font-family="Menlo, Monaco, 'Courier New', monospace">
    <!-- Wordmark -->
    <text x="450" y="230" font-weight="900" font-size="130" letter-spacing="6" fill="url(#text)">ATLAS</text>

    <!-- Tagline -->
    <text x="454" y="280" font-weight="600" font-size="26" letter-spacing="2" fill="#22d3ee">
      Agentic Harness Standard
    </text>

    <!-- Promise -->
    <text x="454" y="362" font-weight="700" font-size="40" fill="#facc15">
      10–30× fewer orientation tokens
    </text>

    <!-- Sub-promise -->
    <text x="454" y="402" font-weight="500" font-size="24" fill="#cbd5e1" opacity="0.9">
      Zero infrastructure. Three Markdown files.
    </text>

    <!-- Runtime row 1 of 2 -->
    <text x="454" y="478" font-weight="500" font-size="18" fill="#94a3b8">
      Claude · Codex · Cursor · Gemini
    </text>

    <!-- Runtime row 2 of 2 -->
    <text x="454" y="502" font-weight="500" font-size="18" fill="#94a3b8">
      Zed · OpenCode · Copilot · Hermes
    </text>

    <!-- URL -->
    <text x="454" y="568" font-weight="400" font-size="22" fill="#22d3ee" opacity="0.85">
      github.com/Abbasi-Alain/atlas
    </text>
  </g>
</svg>
