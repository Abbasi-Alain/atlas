name: release-deb

# Builds atlas_<version>_all.deb on every published release and uploads
# it as a release asset. Lets users curl the .deb directly from the
# release page or via the latest/download/ shortcut.

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Build .deb
        run: |
          bash packaging/debian/build-deb.sh
          ls -lh dist/

      - name: Wait for the GitHub release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for _ in $(seq 1 40); do
            if gh release view "${{ github.ref_name }}" -R "${{ github.repository }}" >/dev/null 2>&1; then
              exit 0
            fi
            echo "waiting for release ${{ github.ref_name }} (created by release.yml)…"; sleep 5
          done
          echo "::error::release ${{ github.ref_name }} did not appear in time"; exit 1

      - name: Checksums + upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VER="${TAG#v}"
          # Hash the .deb and the source tarball GitHub auto-generates for the tag.
          curl -fsSL -o "atlas-${VER}.tar.gz" \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          sha256sum dist/atlas_*.deb "atlas-${VER}.tar.gz" | tee checksums.txt
          gh release upload "$TAG" dist/atlas_*.deb checksums.txt --clobber
